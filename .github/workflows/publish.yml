name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC token for PyPI trusted publishing; no API key needed

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Check tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(poetry version --short)"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match pyproject version $version" >&2
            exit 1
          fi

      - name: Build
        run: poetry build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        run: |
          version="${GITHUB_REF_NAME#v}"
          docker build \
            -t "ghcr.io/${{ github.repository }}:$version" \
            -t "ghcr.io/${{ github.repository }}:latest" \
            .
          docker push --all-tags "ghcr.io/${{ github.repository }}"
